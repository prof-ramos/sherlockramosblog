baseUrl: 'https://prof-ramos.github.io/sherlockramosblog/'
languageCode: pt-br
defaultContentLanguage: pt-br
title: 'SherlockRamos - Blog'
theme: PaperMod
params:
  env: production
  description: "Blog pessoal de Gabriel Ramos"
  author: Gabriel Ramos
  profileMode:
    enabled: true
    title: "Bem-vindo!"
    subtitle: "Poeta, seresteiro, cantor e mentiroso"
    imageUrl: "https://pbs.twimg.com/profile_images/1975318443646709760/Ve9wMLwI_400x400.jpg"
    imageTitle: "Minha foto"
    imageWidth: 120
    imageHeight: 120
  showReadingTime: true
  showShareButtons: true
  showPostNavLinks: true
  showBreadCrumbs: true
  showCodeCopyButtons: true
  showWordCount: true
  showRssButtonInSectionTermList: true
  useHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showToc: false
  tocOpen: false
  socialIcons:
    - name: twitter
      url: "https://twitter.com/GatoMaconhado_"
  cover:
    hidden: true
    hiddenInList: false
    hiddenInSingle: false
menu:
  main:
    - identifier: posts
      name: Posts
      url: /posts/
      weight: 10
    - identifier: about
      name: Sobre
      url: /about/
      weight: 20
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 30
outputs:
  home:
    - html
    - rss
    - json
