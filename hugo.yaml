baseUrl: 'https://prof-ramos.github.io/sherlockramosblog/'
languageCode: pt-br
defaultContentLanguage: pt-br
title: 'SherlockRamos - Blog'
theme: PaperMod

# Image processing configuration
imaging:
  resampleFilter: lanczos
  quality: 85
  anchor: smart

params:
  env: production
  description: "Reflexões sobre tecnologia, cultura e desenvolvimento"
  author: Gabriel Ramos

  # Main sections for homepage
  mainSections:
    - posts

  # Profile Mode Configuration
  profileMode:
    enabled: true
    title: "Bem-vindo!"
    subtitle: "Poeta, seresteiro, cantor e mentiroso"
    imageUrl: "https://pbs.twimg.com/profile_images/1975318443646709760/Ve9wMLwI_400x400.jpg"
    imageTitle: "Gabriel Ramos"
    imageWidth: 120
    imageHeight: 120
    buttons:
      - name: Posts
        url: /posts
      - name: Tags
        url: /tags
      - name: Sobre
        url: /about

  # Feature Toggles
  showReadingTime: true
  showShareButtons: true
  showPostNavLinks: true
  showBreadCrumbs: true
  showCodeCopyButtons: true
  showWordCount: false
  showRssButtonInSectionTermList: true
  useHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showToc: true
  tocOpen: false

  # Theme Configuration
  defaultTheme: dark
  disableThemeToggle: false

  # Search Configuration (Fuse.js)
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

  # Social Icons
  socialIcons:
    - name: twitter
      url: "https://twitter.com/GatoMaconhado_"
    - name: rss
      url: "/index.xml"

  # Cover Images
  cover:
    linkFullImages: true
    responsiveImages: true
    hidden: false
    hiddenInList: false
    hiddenInSingle: false
menu:
  main:
    - identifier: posts
      name: Posts
      url: /posts/
      weight: 10
    - identifier: about
      name: Sobre
      url: /about/
      weight: 20
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 30
    - identifier: search
      name: Buscar
      url: /search/
      weight: 40
outputs:
  home:
    - html
    - rss
    - json
