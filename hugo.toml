baseURL = 'https://sherlockramos.github.io/'
languageCode = 'pt-br'
title = 'Sherlock Ramos Blog'
theme = 'PaperMod'

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
enableEmoji = true
pygmentsUseClasses = true

[minify]
disableXML = true
minifyOutput = true

[params]
env = "production"
title = "Sherlock Ramos"
description = "Blog pessoal sobre tecnologia, desenvolvimento e inovação"
keywords = ["Blog", "Portfolio", "Tech", "Desenvolvimento"]
author = "Sherlock Ramos"
images = ["/images/avatar.png"]
DateFormat = "2 January 2006"
defaultTheme = "auto"
disableThemeToggle = false
ShowReadingTime = true
ShowShareButtons = true
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowWordCount = true
ShowRssButtonInSectionTermList = true
UseHugoToc = true
disableSpecial1stPost = false
disableScrollToTop = false
comments = true
hidemeta = false
hideSummary = false
showtoc = true
tocopen = false

[params.homeInfoParams]
Title = "Olá, sou Sherlock Ramos 👋"
Content = "Bem-vindo ao meu blog pessoal onde compartilho conhecimentos sobre tecnologia, desenvolvimento e inovação."

[[params.socialIcons]]
name = "github"
url = "https://github.com/sherlockramos"

[[params.socialIcons]]
name = "linkedin"
url = "https://linkedin.com/in/sherlockramos"

[params.assets]
disableHLJS = false
disableFingerprinting = false

[params.label]
text = "Sherlock Ramos"
icon = "/images/avatar.png"
iconHeight = 35

[params.analytics.google]
SiteVerificationTag = ""

[params.cover]
hidden = false
hiddenInList = false
hiddenInSingle = false

[params.editPost]
URL = "https://github.com/sherlockramos/sherlockramosblog/tree/main/content"
Text = "Sugerir Alterações"
appendFilePath = true

[params.fuseOpts]
isCaseSensitive = false
shouldSort = true
location = 0
distance = 1000
threshold = 0.4
minMatchCharLength = 0
keys = ["title", "permalink", "summary", "content"]

[[menu.main]]
identifier = "home"
name = "Início"
url = "/"
weight = 10

[[menu.main]]
identifier = "posts"
name = "Posts"
url = "/posts/"
weight = 20

[[menu.main]]
identifier = "categories"
name = "Categorias"
url = "/categories/"
weight = 30

[[menu.main]]
identifier = "tags"
name = "Tags"
url = "/tags/"
weight = 40

[[menu.main]]
identifier = "about"
name = "Sobre"
url = "/about/"
weight = 50

[[menu.main]]
identifier = "search"
name = "Buscar"
url = "/search/"
weight = 60

[outputs]
home = ["HTML", "RSS", "JSON"]

[markup.highlight]
noClasses = false
codeFences = true
guessSyntax = true
lineNos = true
lineNumbersInTable = true
style = "monokai"
